<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Clock Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --clock-color: #ffffff;
        }
        body {
            margin: 0;
            background-color: #000000;
            color: var(--clock-color);
            font-family: 'Noto Sans JP', sans-serif;
            height: 100vh;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: color 0.5s ease;
            position: relative;
        }

        /* 時計の移動用コンテナ */
        #clock-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            transition: transform 0.1s linear, font-size 0.5s ease;
            width: 90%;
            pointer-events: none;
        }

        #date {
            font-size: 6vw;
            margin-bottom: 1rem;
            opacity: 0.8;
            transition: font-size 0.5s ease;
        }
        #time {
            font-size: 22vw;
            line-height: 1;
            font-weight: 700;
            transition: font-size 0.5s ease;
        }

        /* 操作パネル（上部中央揃え） */
        #controls {
            position: absolute; 
            top: env(safe-area-inset-top, 20px); 
            left: 50%;
            transform: translateX(-50%); /* 中央揃え */
            display: flex; 
            align-items: center; 
            gap: 8px;
            background: rgba(255,255,255,0.1); 
            padding: 8px 12px; 
            border-radius: 8px; 
            z-index: 100;
            white-space: nowrap;
        }

        /* 下部エリア（ヒントと戻るボタンをまとめる） */
        #footer-area {
            position: absolute;
            bottom: env(safe-area-inset-bottom, 30px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            z-index: 100;
        }

        .hint {
            font-size: 1rem;
            opacity: 0.4;
            color: #ffffff !important;
            text-align: center;
        }

        #back-link {
            /* 位置固定を解除し、footer-area内での配置にする */
            position: static; 
        }

        /* アニメーション用 */
        #controls, #footer-area {
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .idle-hide {
            opacity: 0;
            visibility: hidden;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ffffff; 
            padding: 8px 12px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 0.8rem;
            text-decoration: none; 
            transition: 0.2s;
            white-space: nowrap;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.2); border-color: #ffffff; }
        .btn.active { background: #2196f3; border-color: #2196f3; }

        #controls span { color: #ffffff !important; font-size: 0.8rem; font-weight: normal; }

        :fullscreen #controls, :fullscreen #footer-area { display: none; }
        input[type="color"] { cursor: pointer; border: none; width: 28px; height: 28px; background: none; padding: 0; }
        
        @media screen and (orientation: landscape) and (max-height: 500px) {
            #time { font-size: 35vh; }
            #date { font-size: 10vh; }
            #footer-area { bottom: 10px; gap: 5px; }
        }
    </style>
</head>
<body id="main-body" onmousemove="resetIdleTimer()" onclick="resetIdleTimer()" ontouchstart="resetIdleTimer()">

    <div id="controls">
        <span>色:</span>
        <input type="color" id="color-picker" value="#ffffff">
        <button class="btn" id="burn-in-btn" onclick="toggleBurnIn()">焼きつき防止</button>
        <button class="btn" onclick="factoryReset(event)">初期化</button>
        <button class="btn" onclick="toggleFullScreen()">全画面</button>
    </div>

    <div id="clock-wrapper">
        <div id="date">0000/00/00 (曜)</div>
        <div id="time">00:00</div>
    </div>
    
    <div id="footer-area">
        <div class="hint">無操作でUIが隠れます</div>
        <div id="back-link">
            <a href="index.html" class="btn">ポータルに戻る</a>
        </div>
    </div>

    <script>
        const timeEl = document.getElementById("time");
        const dateEl = document.getElementById("date");
        const wrapper = document.getElementById("clock-wrapper");
        const colorPicker = document.getElementById("color-picker");

        function updateClock() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const week = ["日", "月", "火", "水", "木", "金", "土"][now.getDay()];
            const h = String(now.getHours()).padStart(2, '0');
            const mi = String(now.getMinutes()).padStart(2, '0');
            dateEl.textContent = `${y}/${m}/${d} (${week})`;
            timeEl.textContent = `${h}:${mi}`;
        }

        let idleTimer;
        function resetIdleTimer() {
            const uiElements = [document.getElementById('controls'), document.getElementById('footer-area')];
            uiElements.forEach(el => { if(el) el.classList.remove('idle-hide'); });
            
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                uiElements.forEach(el => { if(el) el.classList.add('idle-hide'); });
            }, 5000);
        }

        let isBurnInMode = false;
        let moveX = 50, moveY = 50;
        let dx = 0.05, dy = 0.05; 
        let animationFrame;

        function toggleBurnIn() {
            isBurnInMode = !isBurnInMode;
            const btn = document.getElementById('burn-in-btn');
            
            if (isBurnInMode) {
                btn.classList.add('active');
                timeEl.style.fontSize = "18vw"; 
                dateEl.style.fontSize = "4vw";
                animateClock();
            } else {
                btn.classList.remove('active');
                cancelAnimationFrame(animationFrame);
                timeEl.style.fontSize = ""; 
                dateEl.style.fontSize = "";
                wrapper.style.left = "50%";
                wrapper.style.top = "50%";
                wrapper.style.transform = "translate(-50%, -50%)";
            }
        }

        function animateClock() {
            if (!isBurnInMode) return;
            moveX += dx; moveY += dy;
            if (moveX > 75 || moveX < 25) dx *= -1;
            if (moveY > 80 || moveY < 20) dy *= -1;
            wrapper.style.left = moveX + "%";
            wrapper.style.top = moveY + "%";
            animationFrame = requestAnimationFrame(animateClock);
        }

        async function factoryReset(event) {
            if (!confirm("設定とキャッシュを初期化しますか？")) return;
            localStorage.removeItem("clock_color");
            if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                for (let r of regs) await r.unregister();
            }
            if ('caches' in window) {
                const keys = await caches.keys();
                await Promise.all(keys.map(k => caches.delete(k)));
            }
            window.location.reload(true);
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        }

        colorPicker.addEventListener("input", (e) => {
            document.documentElement.style.setProperty('--clock-color', e.target.value);
            localStorage.setItem("clock_color", e.target.value);
        });

        window.addEventListener("DOMContentLoaded", () => {
            const savedColor = localStorage.getItem("clock_color");
            if (savedColor) {
                document.documentElement.style.setProperty('--clock-color', savedColor);
                colorPicker.value = savedColor;
            }
            updateClock();
            setInterval(updateClock, 1000);
            resetIdleTimer();
        });
    </script>
</body>
</html>
