<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Clock Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --clock-color: #ffffff; }
        body {
            margin: 0;
            background-color: #000000;
            color: var(--clock-color);
            font-family: 'Noto Sans JP', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: -webkit-fill-available; /* iOSのツールバーを除いた高さ */
            overflow: hidden;
            transition: color 0.5s ease;
        }
        #clock-container { text-align: center; cursor: pointer; user-select: none; width: 100%; }
        #date { font-size: 8vw; margin-bottom: 1rem; opacity: 0.8; }
        #time { font-size: 30vw; line-height: 1; font-weight: 700; }
        
        #controls {
            position: absolute; top: env(safe-area-inset-top, 20px); right: 20px;
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; z-index: 100;
        }
        #controls span { color: #ffffff !important; font-size: 0.9rem; }
        
        .hint {
            position: absolute; bottom: env(safe-area-inset-bottom, 30px);
            font-size: 1rem; opacity: 0.4; color: #ffffff !important;
        }

        /* 全画面（または擬似全画面）時の非表示設定 */
        .is-fullscreen #controls, .is-fullscreen .hint { display: none; }
        
        /* PC/Android標準のFullscreen用 */
        :fullscreen #controls, :fullscreen .hint { display: none; }

        input[type="color"] { cursor: pointer; border: none; width: 30px; height: 30px; background: none; padding: 0; }
    </style>
</head>
<body>

    <div id="controls">
        <span>文字色:</span>
        <input type="color" id="color-picker" value="#ffffff">
    </div>

    <div id="clock-container" onclick="handleTap()">
        <div id="date">----/--/-- (-)</div>
        <div id="time">00:00</div>
    </div>
    
    <div class="hint">画面タップで全画面風表示 / 長押しで戻る</div>

    <script>
        const timeEl = document.getElementById("time");
        const dateEl = document.getElementById("date");
        const colorPicker = document.getElementById("color-picker");
        const bodyEl = document.body;

        function updateClock() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const week = ["日", "月", "火", "水", "木", "金", "土"][now.getDay()];
            const h = String(now.getHours()).padStart(2, '0');
            const mi = String(now.getMinutes()).padStart(2, '0');
            dateEl.textContent = `${y}/${m}/${d} (${week})`;
            timeEl.textContent = `${h}:${mi}`;
        }

        // iOS向けの「タップでUIを隠す」処理
        function handleTap() {
            if (document.fullscreenEnabled || document.webkitFullscreenEnabled) {
                // 通常のFullscreen APIを試行
                toggleFullScreen();
            } else {
                // iOS Safari向け：クラス切り替えでUIを隠す
                bodyEl.classList.toggle('is-fullscreen');
                // アドレスバーを隠すためのハック（スクロールを促す）
                window.scrollTo(0, 1);
            }
        }

        function toggleFullScreen() {
            const doc = document.documentElement;
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (doc.requestFullscreen) doc.requestFullscreen();
                else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        }

        colorPicker.addEventListener("input", (e) => {
            const color = e.target.value;
            document.documentElement.style.setProperty('--clock-color', color);
            localStorage.setItem("clock_color", color);
        });

        window.addEventListener("DOMContentLoaded", () => {
            const savedColor = localStorage.getItem("clock_color");
            if (savedColor) {
                document.documentElement.style.setProperty('--clock-color', savedColor);
                colorPicker.value = savedColor;
            }
            updateClock();
            setInterval(updateClock, 1000);
        });
    </script>
</body>
</html>
