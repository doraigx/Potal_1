<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Clock Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --clock-color: #ffffff;
        }
        body {
            margin: 0;
            background-color: #000000;
            color: var(--clock-color);
            font-family: 'Noto Sans JP', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: color 0.5s ease;
            position: relative;
        }
        #clock-container {
            text-align: center;
            cursor: pointer;
            user-select: none;
            width: 100%;
        }
        #date {
            font-size: 5vw;
            margin-bottom: 1rem;
            opacity: 0.8;
        }
        #time {
            font-size: 25vw;
            line-height: 1;
            font-weight: 700;
        }
        
        /* 操作パネル */
        #controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.1);
            padding: 10px 15px;
            border-radius: 8px;
            z-index: 100;
            transition: opacity 0.3s, visibility 0.3s;
        }

        #controls span {
            color: #ffffff !important;
            font-size: 0.9rem;
            font-weight: normal;
        }

        /* 各種ボタンの共通スタイル */
        .btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: #ffffff;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #ffffff;
        }

        /* 戻るボタン専用（左上） */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            opacity: 0.8;
        }

        .hint {
            position: absolute;
            bottom: 30px;
            font-size: 1.2rem;
            opacity: 0.4;
            color: #ffffff !important;
            transition: opacity 0.3s;
        }

        /* 擬似全画面（UIを隠す）モード */
        .is-ui-hidden #controls, 
        .is-ui-hidden .back-btn, 
        .is-ui-hidden .hint {
            opacity: 0;
            visibility: hidden;
        }

        /* ブラウザ標準の全画面時 */
        :fullscreen #controls, :fullscreen .back-btn, :fullscreen .hint {
            display: none;
        }

        input[type="color"] {
            cursor: pointer;
            border: none;
            width: 30px;
            height: 30px;
            background: none;
            padding: 0;
        }
    </style>
</head>
<body id="main-body">

    <a href="index.html" class="back-btn btn">🔙 ポータルに戻る</a>

    <div id="controls">
        <span>文字色:</span>
        <input type="color" id="color-picker" value="#ffffff">
        <button class="btn" onclick="resetSettings()" title="初期化">🔄 リセット</button>
        <button class="btn" onclick="toggleFullScreen()" title="全画面">🖥️ 全画面</button>
    </div>

    <div id="clock-container" onclick="toggleUI()">
        <div id="date">0000/00/00 (曜)</div>
        <div id="time">00:00</div>
    </div>
    
    <div class="hint">時計をクリックでUIを隠す / Escで終了</div>

    <script>
        const timeEl = document.getElementById("time");
        const dateEl = document.getElementById("date");
        const colorPicker = document.getElementById("color-picker");
        const body = document.getElementById("main-body");

        function updateClock() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const week = ["日", "月", "火", "水", "木", "金", "土"][now.getDay()];
            
            const h = String(now.getHours()).padStart(2, '0');
            const mi = String(now.getMinutes()).padStart(2, '0');

            dateEl.textContent = `${y}/${m}/${d} (${week})`;
            timeEl.textContent = `${h}:${mi}`;
        }

        // 文字色変更
        colorPicker.addEventListener("input", (e) => {
            const color = e.target.value;
            applyColor(color);
        });

        function applyColor(color) {
            document.documentElement.style.setProperty('--clock-color', color);
            localStorage.setItem("clock_color", color);
            colorPicker.value = color;
        }

        // 初期化処理
        function resetSettings() {
            if(confirm("文字色設定を初期化しますか？")) {
                localStorage.removeItem("clock_color");
                applyColor("#ffffff");
            }
        }

        // 全画面切り替え（ブラウザ標準）
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error(`Error: ${err.message}`);
                    // 失敗した場合は擬似全画面にする
                    toggleUI();
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // 擬似全画面（UIのみ隠す）
        function toggleUI() {
            body.classList.toggle('is-ui-hidden');
        }

        // 設定の復元
        window.addEventListener("DOMContentLoaded", () => {
            const savedColor = localStorage.getItem("clock_color");
            if (savedColor) {
                applyColor(savedColor);
            }
            updateClock();
            setInterval(updateClock, 1000);
        });
    </script>
</body>
</html>
