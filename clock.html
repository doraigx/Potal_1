<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Clock Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --clock-color: #ffffff;
        }
        body {
            margin: 0;
            background-color: #000000;
            color: var(--clock-color);
            font-family: 'Noto Sans JP', sans-serif;
            /* スマホのツールバーを考慮した高さ設定 */
            height: 100vh;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: color 0.5s ease;
            position: relative;
        }

        /* 時計の移動用コンテナ */
        #clock-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            transition: transform 0.1s linear, font-size 0.5s ease;
            width: 90%; /* スマホでの横幅溢れ防止 */
            pointer-events: none; /* 下のクリックを邪魔しない */
        }

        #date {
            font-size: 6vw; /* スマホ向けに少し調整 */
            margin-bottom: 1rem;
            opacity: 0.8;
            transition: font-size 0.5s ease;
        }
        #time {
            font-size: 22vw; /* スマホでの折り返し防止のため少し縮小 */
            line-height: 1;
            font-weight: 700;
            transition: font-size 0.5s ease;
        }

        /* 操作パネル */
        #controls, #back-link, .hint {
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        /* 無操作時に隠すクラス */
        .idle-hide {
            opacity: 0;
            visibility: hidden;
        }

        #controls {
            position: absolute; 
            /* Safe Area対応：画面端に寄りすぎないよう調整 */
            top: env(safe-area-inset-top, 20px); 
            right: env(safe-area-inset-right, 20px);
            display: flex; align-items: center; gap: 8px; /* gapを少し詰め */
            background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 8px; z-index: 100;
            flex-wrap: wrap; justify-content: flex-end; /* スマホでボタンが溢れた時用 */
        }
        #back-link { 
            position: absolute; 
            top: env(safe-area-inset-top, 20px); 
            left: env(safe-area-inset-left, 20px); 
            z-index: 100; 
        }

        .btn {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ffffff; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; /* 少し小さく */
            text-decoration: none; transition: 0.2s;
            white-space: nowrap; /* 改行防止 */
        }
        .btn:hover { background: rgba(255, 255, 255, 0.2); border-color: #ffffff; }
        .btn.active { background: #2196f3; border-color: #2196f3; }

        #controls span { color: #ffffff !important; font-size: 0.8rem; font-weight: normal; }
        .hint { 
            position: absolute; 
            bottom: env(safe-area-inset-bottom, 30px); 
            left: 50%; transform: translateX(-50%); 
            font-size: 1rem; opacity: 0.4; color: #ffffff !important; 
            width: 100%; text-align: center;
        }

        :fullscreen #controls, :fullscreen .hint, :fullscreen #back-link { display: none; }
        input[type="color"] { cursor: pointer; border: none; width: 28px; height: 28px; background: none; padding: 0; }
        
        /* 横画面スマホ用の微調整 */
        @media screen and (orientation: landscape) and (max-height: 500px) {
            #time { font-size: 35vh; }
            #date { font-size: 10vh; }
        }
    </style>
</head>
<body id="main-body" onmousemove="resetIdleTimer()" onclick="resetIdleTimer()" ontouchstart="resetIdleTimer()">

    <div id="back-link">
        <a href="index.html" class="btn">ポータルに戻る</a>
    </div>

    <div id="controls">
        <span>色:</span>
        <input type="color" id="color-picker" value="#ffffff">
        <button class="btn" id="burn-in-btn" onclick="toggleBurnIn()">焼きつき防止</button>
        <button class="btn" onclick="factoryReset(event)">初期化</button>
        <button class="btn" onclick="toggleFullScreen()">全画面</button>
    </div>

    <div id="clock-wrapper">
        <div id="date">0000/00/00 (曜)</div>
        <div id="time">00:00</div>
    </div>
    
    <div class="hint">無操作でUIが隠れます</div>

    <script>
        const timeEl = document.getElementById("time");
        const dateEl = document.getElementById("date");
        const wrapper = document.getElementById("clock-wrapper");
        const colorPicker = document.getElementById("color-picker");

        // --- 時計更新 ---
        function updateClock() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const week = ["日", "月", "火", "水", "木", "金", "土"][now.getDay()];
            const h = String(now.getHours()).padStart(2, '0');
            const mi = String(now.getMinutes()).padStart(2, '0');
            dateEl.textContent = `${y}/${m}/${d} (${week})`;
            timeEl.textContent = `${h}:${mi}`;
        }

        // --- 無操作タイマー (5秒) ---
        let idleTimer;
        function resetIdleTimer() {
            const uiElements = [document.getElementById('controls'), document.getElementById('back-link'), document.querySelector('.hint')];
            uiElements.forEach(el => { if(el) el.classList.remove('idle-hide'); });
            
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                uiElements.forEach(el => { if(el) el.classList.add('idle-hide'); });
            }, 5000);
        }

        // --- 焼きつき防止機能 ---
        let isBurnInMode = false;
        let moveX = 50, moveY = 50;
        let dx = 0.05, dy = 0.05; // 移動速度
        let animationFrame;

        function toggleBurnIn() {
            isBurnInMode = !isBurnInMode;
            const btn = document.getElementById('burn-in-btn');
            
            if (isBurnInMode) {
                btn.classList.add('active');
                timeEl.style.fontSize = "18vw"; // 少し大きめに調整
                dateEl.style.fontSize = "4vw";
                animateClock();
            } else {
                btn.classList.remove('active');
                cancelAnimationFrame(animationFrame);
                timeEl.style.fontSize = ""; // 元に戻す
                dateEl.style.fontSize = "";
                wrapper.style.left = "50%";
                wrapper.style.top = "50%";
                wrapper.style.transform = "translate(-50%, -50%)";
            }
        }

        function animateClock() {
            if (!isBurnInMode) return;

            moveX += dx;
            moveY += dy;

            // スマホ向けに跳ね返り範囲を調整
            if (moveX > 75 || moveX < 25) dx *= -1;
            if (moveY > 80 || moveY < 20) dy *= -1;

            wrapper.style.left = moveX + "%";
            wrapper.style.top = moveY + "%";
            
            animationFrame = requestAnimationFrame(animateClock);
        }

        // --- 初期化 / その他機能 ---
        async function factoryReset(event) {
            if (!confirm("設定とキャッシュを初期化しますか？")) return;
            localStorage.removeItem("clock_color");
            if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                for (let r of regs) await r.unregister();
            }
            if ('caches' in window) {
                const keys = await caches.keys();
                await Promise.all(keys.map(k => caches.delete(k)));
            }
            window.location.reload(true);
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {
                    // スマホSafari用：全画面不可時はUI隠しだけで対応
                });
            } else {
                document.exitFullscreen();
            }
        }

        colorPicker.addEventListener("input", (e) => {
            document.documentElement.style.setProperty('--clock-color', e.target.value);
            localStorage.setItem("clock_color", e.target.value);
        });

        window.addEventListener("DOMContentLoaded", () => {
            const savedColor = localStorage.getItem("clock_color");
            if (savedColor) {
                document.documentElement.style.setProperty('--clock-color', savedColor);
                colorPicker.value = savedColor;
            }
            updateClock();
            setInterval(updateClock, 1000);
            resetIdleTimer();
        });
    </script>
</body>
</html>
