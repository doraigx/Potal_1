<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 360px;
            width: 90%;
        }
        h2 { margin-bottom: 20px; font-size: 1.5rem; }
        .btn-google {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }
        .btn-google:hover { background: #e5e5e5; }
        .error-msg { color: #ff4444; margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Portal へログイン</h2>
    <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 30px;">時間割や記念日などの個人情報を同期するため、Googleアカウントでログインしてください。</p>
    <button class="btn-google" id="login-btn">
        Googleアカウントでログイン
    </button>
    <div id="error" class="error-msg"></div>
</div>

<script type="module">
    // Firebase SDKのインポート
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // 💡 あなたのFirebaseプロジェクトのコンソールからコピーした設定に置き換えてください
   const firebaseConfig = {
  apiKey: "AIzaSyBCNywQHj5fXQTm5_9GlM5csQSIjD7hnwE",
  authDomain: "mypotal.firebaseapp.com",
  projectId: "mypotal",
  storageBucket: "mypotal.firebasestorage.app",
  messagingSenderId: "743769639086",
  appId: "1:743769639086:web:058ba51de8eeba2e35c53f",
  measurementId: "G-19BLW978LJ"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // すでにログイン済みなら自動でインデックスへリダイレクト
    onAuthStateChanged(auth, (user) => {
        if (user) {
            window.location.href = "./index.html";
        }
    });

    // ログインボタンのイベントリスナー
    document.getElementById("login-btn").addEventListener("click", async () => {
        try {
            await signInWithPopup(auth, provider);
            // 成功すれば上の onAuthStateChanged が検知してリダイレクトされます
        } catch (error) {
            console.error(error);
            document.getElementById("error").textContent = "ログインに失敗しました。";
        }
    });
</script>
</body>
</html>
