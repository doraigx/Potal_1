<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 360px;
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 12px; /* ボタン同士の隙間 */
        }
        h2 { margin-bottom: 10px; font-size: 1.5rem; }
        p { color: #aaa; font-size: 0.9rem; margin-bottom: 20px; line-height: 1.4; }
        
        .btn-google {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
        }
        .btn-google:hover { background: #e5e5e5; }

        /* 💡 新設：アカウントなしで続けるボタンのスタイル */
        .btn-guest {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }
        .btn-guest:hover { 
            background: rgba(255, 255, 255, 0.2); 
            border-color: #ffffff;
        }

        .error-msg { color: #ff4444; margin-top: 5px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Portal へログイン</h2>
    <p>時間割や記念日などの個人情報を同期するため、Googleアカウントでログインしてください。</p>
    
    <button class="btn-google" id="login-btn">
        Googleアカウントでログイン
    </button>

    <button class="btn-guest" id="guest-btn">
        アカウントなしで続ける (端末内保存)
    </button>

    <div id="error" class="error-msg"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBCNywQHj5fXQTm5_9GlM5csQSIjD7hnwE",
        authDomain: "mypotal.firebaseapp.com",
        projectId: "mypotal",
        storageBucket: "mypotal.firebasestorage.app",
        messagingSenderId: "743769639086",
        appId: "1:743769639086:web:058ba51de8eeba2e35c53f",
        measurementId: "G-19BLW978LJ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // すでにログイン済みなら自動でインデックスへリダイレクト
    onAuthStateChanged(auth, (user) => {
        // 💡 セッションストレージに「ゲストとして進んだ旗」がない場合のみ、自動リダイレクトを行う
        if (user && !sessionStorage.getItem('skipLogin')) {
            window.location.href = "./index.html";
        }
    });

    // Googleログインボタン
    document.getElementById("login-btn").addEventListener("click", async () => {
        try {
            // ログインする時は「スキップの旗」を消す
            sessionStorage.removeItem('skipLogin');
            await signInWithPopup(auth, provider);
        } catch (error) {
            console.error(error);
            document.getElementById("error").textContent = "ログインに失敗しました。";
        }
    });

    // 💡 新設：アカウントなしで続けるボタンのイベント
    document.getElementById("guest-btn").addEventListener("click", () => {
        // 「このセッション中はログインをスキップする」という目印（旗）をブラウザに立てる
        sessionStorage.setItem('skipLogin', 'true');
        // そのままポータル本体へ移動
        window.location.href = "./index.html";
    });
</script>
</body>
</html>
